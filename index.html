<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>Palácio dos Sonhos</title>
  <meta name="description" content="Construa seus hábitos, conquiste XP e evolua seu palácio pessoal." />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/icon-512.png" />

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Palácio dos Sonhos" />
  <meta property="og:description"
    content="App gamificado de hábitos — construa XP, evolua seu palácio e domine sua rotina." />
  <meta property="og:image" content="https://palacio-dos-sonhos.vercel.app/icon-512.png" />

  <meta name="twitter:card" content="summary" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#292524" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Palácio" />
  <link rel="apple-touch-icon" href="/icon-512.png" />

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=VT323&display=swap"
    rel="stylesheet">
</head>

<body class="bg-stone-50 text-stone-800 font-sans antialiased selection:bg-rose-200 selection:text-rose-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW:', err));
      });
    }
  </script>
</body>
